name: R CMD check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  r-cmd-check:
    runs-on: ubuntu-latest

    env:
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: sudo apt-get install -y libnode-dev

      - name: Install check dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck", "testthat", "withr", "knitr", "rmarkdown"))
          remotes::install_deps(dependencies = c("Depends", "Imports", "LinkingTo"), upgrade = "never")
          install.packages(c(
            "ggplot2", "lattice", "htmlwidgets", "ggExtra", "plotly",
            "psych", "afex", "effectsize", "emmeans", "multcomp",
            "ordinal", "forecast", "geepack", "randomForest", "car",
            "mediation", "lavaan", "lmerTest", "broom.mixed", "lme4",
            "mgcv", "nnet", "nlme", "performance", "rstatix", "survival"
          ))
        shell: Rscript {0}

      - name: Check package
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--no-build-vignettes"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}
