name: R CMD check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  r-cmd-check:
    runs-on: ubuntu-latest

    env:
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install check dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck", "testthat", "withr", "knitr", "rmarkdown"))
          remotes::install_deps(dependencies = c("Depends", "Imports", "LinkingTo"), upgrade = "never")
        shell: Rscript {0}

      - name: Check package
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--no-build-vignettes"),
            error_on = "error",
            check_dir = "check"
          )
        shell: Rscript {0}
